{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-3 border-top border-danger border-4 mt-4">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 text-center">
                <i class="bi bi-exclamation-triangle text-danger display-4 mb-2 d-block"></i>
                <h2 class="text-danger fw-bold">Delete Car</h2>
                <p class="text-muted">Enter the ID of the car you wish to permanently remove.</p>
            </div>
            <div class="card-body p-4">
                <form action="{% url 'delete' %}" method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="car_id" class="form-label fw-semibold text-secondary">Car ID</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-hash text-muted"></i></span>
                            <input type="number" class="form-control border-start-0 ps-0" id="car_id" name="car_id" placeholder="e.g. 1" required>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg shadow-sm"><i class="bi bi-trash3-fill me-1"></i> Confirm Deletion</button>
                        <a href="{% url 'lists' %}" class="btn btn-light text-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

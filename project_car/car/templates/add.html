{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-3 mt-4">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                <h2 class="text-center text-primary fw-bold"><i class="bi bi-plus-circle-fill me-2"></i>Add a New Car</h2>
            </div>
            <div class="card-body p-4">
                <form action="{% url 'add' %}" method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="name" class="form-label fw-semibold text-secondary">Car Model / Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-car-front text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="name" name="name" placeholder="e.g. Toyota Corolla" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="year" class="form-label fw-semibold text-secondary">Manufacturing Year</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-calendar3 text-muted"></i></span>
                            <input type="number" class="form-control border-start-0 ps-0" id="year" name="year" placeholder="e.g. 2024" required>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm"><i class="bi bi-check2-circle me-1"></i> Save Car</button>
                        <a href="{% url 'lists' %}" class="btn btn-light text-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
